<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARPLE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'APL385 Unicode', 'DejaVu Sans Mono',
                         'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            padding: 0.5em;
            font-size: 1em;
            color: #8888aa;
            text-align: center;
        }
        #session {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 1em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        pre.input { color: #c0c0c0; }
        pre.output { color: #e0e0e0; }
        pre.error { color: #ff6b6b; }
        #input-bar {
            display: flex;
            padding: 0.5em;
            border-top: 1px solid #333;
            background: #16213e;
        }
        #input {
            flex: 1;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            outline: none;
        }
        #input:focus { border-color: #6b8afd; }
        #input.backtick { border-color: #ff9f43; background: #1a2a4a; }
    </style>
</head>
<body>
    <h1>MARPLE</h1>
    <div id="session"></div>
    <div id="input-bar">
        <input type="text" id="input"
               autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false"
               placeholder="APL expression">
    </div>

    <script>
    var input = document.getElementById('input');
    var session = document.getElementById('session');

    var GLYPHS = {
        '-':'×','=':'÷','<':'≤','>':'≥','/':'≠',
        'r':'⍴','i':'⍳','e':'∈','t':'↑','y':'↓',
        'q':'⌽','Q':'⍉','g':'⍋','G':'⍒',
        '^':'∧','v':'∨','~':'⍲','T':'⍱',
        '*':'⍟','o':'○','!':'⌈','d':'⌊','D':'⌹',
        'p':'⌈','b':'⌊',
        'n':'⊤','N':'⊥',
        'w':'⍵','a':'⍺','V':'∇',
        'l':'←','x':'⋄','z':'⍎','Z':'⍕',
        'j':'∘','J':'⍤','I':'⌷','B':'⌶',
        '2':'¯','c':'⍝','[':'{',']':'}'
    };
    var backtickMode = false;

    function insertAtCursor(el, text) {
        var start = el.selectionStart;
        var end = el.selectionEnd;
        var val = el.value;
        el.value = val.substring(0, start) + text + val.substring(end);
        el.selectionStart = el.selectionEnd = start + text.length;
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && backtickMode) {
            backtickMode = false;
            input.className = input.className.replace(' backtick', '');
            e.preventDefault();
            return;
        }
        if (backtickMode) {
            e.preventDefault();
            backtickMode = false;
            input.className = input.className.replace(' backtick', '');
            if (e.key === '`') {
                insertAtCursor(input, '`');
            } else if (GLYPHS[e.key]) {
                insertAtCursor(input, GLYPHS[e.key]);
            } else {
                insertAtCursor(input, '`' + e.key);
            }
            return;
        }
        if (e.key === '`') {
            e.preventDefault();
            backtickMode = true;
            input.className += ' backtick';
            return;
        }
    });

    input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();

        var text = input.value.trim();
        if (!text) return;
        input.value = '';

        var url = text.charAt(0) === ')' ? '/system' : '/eval';
        var param = text.charAt(0) === ')' ? 'cmd' : 'expr';
        var body = param + '=' + encodeURIComponent(text);

        var xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.setRequestHeader('Content-Type',
            'application/x-www-form-urlencoded');
        xhr.onload = function() {
            session.insertAdjacentHTML('beforeend', xhr.responseText);
            session.scrollTop = session.scrollHeight;
        };
        xhr.onerror = function() {
            session.insertAdjacentHTML('beforeend',
                '<div class="entry">' +
                '<pre class="error">Connection error</pre>' +
                '</div>');
        };
        xhr.send(body);
        input.focus();
    });

    input.focus();
    </script>
</body>
</html>
