<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARPLE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'APL385 Unicode', 'DejaVu Sans Mono',
                         'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            padding: 0.5em;
            font-size: 1em;
            color: #8888aa;
            text-align: center;
        }
        #session {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 1em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        pre.input { color: #c0c0c0; }
        pre.output { color: #e0e0e0; }
        pre.error { color: #ff6b6b; }
        #input-bar {
            display: flex;
            padding: 0.5em;
            border-top: 1px solid #333;
            background: #16213e;
        }
        #input {
            flex: 1;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            outline: none;
        }
        #input:focus { border-color: #6b8afd; }
        #input.backtick { border-color: #ff9f43; background: #1a2a4a; }
        #langbar {
            padding: 0.3em 0.5em;
            background: #16213e;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }
        #langbar button {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 0.2em 0.5em;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
        }
        #langbar button:hover { background: #1a4a8a; border-color: #6b8afd; }
    </style>
</head>
<body>
    <h1>MARPLE</h1>
    <div id="langbar"></div>
    <div id="session"></div>
    <div id="input-bar">
        <input type="text" id="input"
               autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false"
               placeholder="APL expression">
    </div>

    <script>
    var input = document.getElementById('input');
    var session = document.getElementById('session');

    // Session history
    var historyList = [];
    var historyPos = -1;

    input.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyList.length === 0) return;
            if (historyPos < historyList.length - 1) historyPos++;
            input.value = historyList[historyList.length - 1 - historyPos];
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyPos > 0) {
                historyPos--;
                input.value = historyList[historyList.length - 1 - historyPos];
            } else {
                historyPos = -1;
                input.value = '';
            }
        }
    });

    var GLYPHS = {
        '-':'×','=':'÷','<':'≤','>':'≥','/':'≠',
        'r':'⍴','i':'⍳','e':'∈','t':'↑','y':'↓',
        'q':'⌽','Q':'⍉','g':'⍋','G':'⍒',
        '^':'∧','v':'∨','~':'⍲','T':'⍱',
        '*':'⍟','o':'○','!':'⌈','d':'⌊','D':'⌹',
        'p':'⌈','b':'⌊',
        'n':'⊤','N':'⊥',
        'w':'⍵','a':'⍺','V':'∇',
        'l':'←','x':'⋄','z':'⍎','Z':'⍕',
        'j':'∘','J':'⍤','I':'⌷','B':'⌶',
        '2':'¯','c':'⍝','[':'{',']':'}'
    };
    var backtickMode = false;

    function insertAtCursor(el, text) {
        var start = el.selectionStart;
        var end = el.selectionEnd;
        var val = el.value;
        el.value = val.substring(0, start) + text + val.substring(end);
        el.selectionStart = el.selectionEnd = start + text.length;
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && backtickMode) {
            backtickMode = false;
            input.className = input.className.replace(' backtick', '');
            e.preventDefault();
            return;
        }
        if (backtickMode) {
            e.preventDefault();
            backtickMode = false;
            input.className = input.className.replace(' backtick', '');
            if (e.key === '`') {
                insertAtCursor(input, '`');
            } else if (GLYPHS[e.key]) {
                insertAtCursor(input, GLYPHS[e.key]);
            } else {
                insertAtCursor(input, '`' + e.key);
            }
            return;
        }
        if (e.key === '`') {
            e.preventDefault();
            backtickMode = true;
            input.className += ' backtick';
            return;
        }
    });

    // Language bar
    var GLYPH_INFO = [
        ['+','Add'],['−','Subtract'],['×','Multiply'],['÷','Divide'],
        ['⌈','Ceiling/Max'],['⌊','Floor/Min'],['*','Power'],['⍟','Log'],
        ['|','Magnitude'],['○','Pi/Trig'],['?','Roll/Deal'],
        ['<','Less'],['≤','Less or equal'],['=','Equal'],['≥','Greater or equal'],
        ['>','Greater'],['≠','Not equal'],
        ['∧','And'],['∨','Or'],['~','Not'],
        ['⍴','Rho'],['⍳','Iota'],[',','Catenate'],['⌽','Reverse'],
        ['⍉','Transpose'],['↑','Take'],['↓','Drop'],
        ['∈','Member'],['⍋','Grade up'],['⍒','Grade down'],
        ['⊤','Encode'],['⊥','Decode'],['⌹','Domino'],
        ['⍎','Execute'],['⍕','Format'],['⌷','From'],
        ['≡','Match'],['≢','Tally'],
        ['←','Assign'],['⍵','Omega'],['⍺','Alpha'],
        ['∇','Del'],['⋄','Diamond'],['⍝','Comment'],['¯','High minus'],
        ['∘','Jot'],['⍤','Rank'],['⌶','I-beam'],
        ['{','Left brace'],['}','Right brace']
    ];
    var langbar = document.getElementById('langbar');
    for (var gi = 0; gi < GLYPH_INFO.length; gi++) {
        var btn = document.createElement('button');
        btn.textContent = GLYPH_INFO[gi][0];
        btn.title = GLYPH_INFO[gi][0] + ' — ' + GLYPH_INFO[gi][1];
        btn.setAttribute('data-g', GLYPH_INFO[gi][0]);
        btn.addEventListener('click', function() {
            insertAtCursor(input, this.getAttribute('data-g'));
            input.focus();
        });
        langbar.appendChild(btn);
    }

    input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();

        var text = input.value.trim();
        if (!text) return;
        input.value = '';
        historyList.push(text);
        historyPos = -1;

        var url = text.charAt(0) === ')' ? '/system' : '/eval';
        var param = text.charAt(0) === ')' ? 'cmd' : 'expr';
        var body = param + '=' + encodeURIComponent(text);

        var xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.setRequestHeader('Content-Type',
            'application/x-www-form-urlencoded');
        xhr.onload = function() {
            session.insertAdjacentHTML('beforeend', xhr.responseText);
            session.scrollTop = session.scrollHeight;
        };
        xhr.onerror = function() {
            session.insertAdjacentHTML('beforeend',
                '<div class="entry">' +
                '<pre class="error">Connection error</pre>' +
                '</div>');
        };
        xhr.send(body);
        input.focus();
    });

    input.focus();
    </script>
</body>
</html>
