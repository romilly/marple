<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARPLE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'APL385 Unicode', 'DejaVu Sans Mono',
                         'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }
        .main-row { height: calc(100vh - 2.5em); }
        #session-col { display: flex; flex-direction: column; height: 100%; }
        #session {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 1em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            background: none;
            color: inherit;
        }
        pre.input { color: #c0c0c0; }
        pre.output { color: #e0e0e0; }
        pre.error { color: #ff6b6b; }
        #input-bar {
            padding: 0.5em;
            border-top: 1px solid #333;
            background: #16213e;
        }
        #input {
            width: 100%;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            outline: none;
            resize: none;
            overflow: hidden;
        }
        #input:focus { border-color: #6b8afd; }
        #input.backtick { border-color: #ff9f43; background: #1a2a4a; }
        #langbar {
            padding: 0.3em 0.5em;
            background: #16213e;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }
        #langbar button {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 0.2em 0.5em;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
        }
        #langbar button:hover { background: #1a4a8a; border-color: #6b8afd; }
        #workspace {
            background: #12122a;
            border-left: 1px solid #333;
            padding: 0.5em;
            overflow-y: auto;
            height: 100%;
            font-size: 0.9em;
        }
        #workspace h4 { color: #8888aa; font-size: 0.85em; margin: 0.5em 0 0.3em; }
        .ws-item {
            padding: 0.2em 0.4em;
            cursor: pointer;
            border-radius: 3px;
        }
        .ws-item:hover { background: #1a2a4a; }
        .ws-shape { color: #666; font-size: 0.85em; }
        .header-bar {
            padding: 0.3em 1em;
            background: #16213e;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
            color: #8888aa;
        }
    </style>
</head>
<body>
    <div class="header-bar d-flex justify-content-between align-items-center">
        <span>MARPLE</span>
    </div>
    <div class="row g-0 main-row">
        <div class="col-md-9 col-lg-10" id="session-col">
            <div id="langbar"></div>
            <div id="session"></div>
            <div id="input-bar">
                <textarea id="input" rows="1"
                       autocomplete="off" autocorrect="off"
                       autocapitalize="off" spellcheck="false"
                       placeholder="APL expression"></textarea>
            </div>
        </div>
        <div class="col-md-3 col-lg-2">
            <div id="workspace"></div>
        </div>
    </div>

    <script>
    const input = document.getElementById('input');
    const session = document.getElementById('session');
    const workspace = document.getElementById('workspace');

    // Session history
    const history = [];
    let historyPos = -1;

    input.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length === 0) return;
            if (historyPos < history.length - 1) historyPos++;
            input.value = history[history.length - 1 - historyPos];
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyPos > 0) {
                historyPos--;
                input.value = history[history.length - 1 - historyPos];
            } else {
                historyPos = -1;
                input.value = '';
            }
        }
    });

    // Backtick glyph input
    const GLYPHS = {
        '-':'×','=':'÷','<':'≤','>':'≥','/':'≠',
        'r':'⍴','i':'⍳','e':'∈','t':'↑','y':'↓',
        'q':'⌽','Q':'⍉','g':'⍋','G':'⍒',
        '^':'∧','v':'∨','~':'⍲','T':'⍱',
        '*':'⍟','o':'○','!':'⌈','d':'⌊','D':'⌹',
        'p':'⌈','b':'⌊',
        'n':'⊤','N':'⊥',
        'w':'⍵','a':'⍺','V':'∇',
        'l':'←','x':'⋄','z':'⍎','Z':'⍕',
        'j':'∘','J':'⍤','I':'⌷','B':'⌶',
        '2':'¯','c':'⍝','[':'{',']':'}'
    };
    let backtickMode = false;

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && backtickMode) {
            backtickMode = false;
            input.classList.remove('backtick');
            e.preventDefault();
            return;
        }
        if (backtickMode) {
            e.preventDefault();
            backtickMode = false;
            input.classList.remove('backtick');
            if (e.key === '`') {
                insertAtCursor(input, '`');
            } else if (GLYPHS[e.key]) {
                insertAtCursor(input, GLYPHS[e.key]);
            } else {
                insertAtCursor(input, '`' + e.key);
            }
            return;
        }
        if (e.key === '`') {
            e.preventDefault();
            backtickMode = true;
            input.classList.add('backtick');
            return;
        }
    });

    function insertAtCursor(el, text) {
        const start = el.selectionStart;
        const end = el.selectionEnd;
        const val = el.value;
        el.value = val.slice(0, start) + text + val.slice(end);
        el.selectionStart = el.selectionEnd = start + text.length;
    }

    // Language bar
    const GLYPH_INFO = [
        ['+','Add','`+'],['−','Subtract'],['×','Multiply','`-'],['÷','Divide','`='],
        ['⌈','Ceiling/Max','`!'],['⌊','Floor/Min','`d'],['*','Power'],['⍟','Log','`*'],
        ['|','Magnitude/Residue'],['○','Pi/Trig','`o'],['?','Roll/Deal'],
        ['<','Less'],['≤','Less or equal','`<'],['=','Equal'],['≥','Greater or equal','`>'],
        ['>','Greater'],['≠','Not equal','`/'],
        ['∧','And','`^'],['∨','Or','`v'],['~','Not'],
        ['⍴','Rho','`r'],['⍳','Iota','`i'],[',','Catenate'],['⌽','Reverse','`q'],
        ['⍉','Transpose','`Q'],['↑','Take','`t'],['↓','Drop','`y'],
        ['∈','Member','`e'],['⍋','Grade up','`g'],['⍒','Grade down','`G'],
        ['⊤','Encode','`n'],['⊥','Decode','`N'],['⌹','Domino','`D'],
        ['⍎','Execute','`z'],['⍕','Format','`Z'],['⌷','From','`I'],
        ['≡','Match'],['≢','Tally/Not match'],
        ['←','Assign','`l'],['⍵','Omega','`w'],['⍺','Alpha','`a'],
        ['∇','Del','`V'],['⋄','Diamond','`x'],['⍝','Comment','`c'],
        ['¯','High minus','`2'],
        ['∘','Jot','`j'],['⍤','Rank','`J'],['⌶','I-beam','`B'],
        ['{','Left brace','`['],['}','Right brace','`]'],
    ];
    const langbar = document.getElementById('langbar');
    GLYPH_INFO.forEach(function(g) {
        const btn = document.createElement('button');
        btn.textContent = g[0];
        btn.title = g[0] + ' — ' + g[1] + (g[2] ? ' — ' + g[2] : '');
        btn.addEventListener('click', function() {
            insertAtCursor(input, g[0]);
            input.focus();
        });
        langbar.appendChild(btn);
    });

    // Auto-resize textarea
    input.addEventListener('input', function() {
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
    });

    // Refresh workspace panel
    async function refreshWorkspace() {
        try {
            const resp = await fetch('/workspace');
            workspace.innerHTML = await resp.text();
            workspace.querySelectorAll('.ws-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    insertAtCursor(input, el.dataset.name);
                    input.focus();
                });
            });
        } catch(e) {}
    }

    input.addEventListener('keydown', async function(e) {
        if (e.key !== 'Enter') return;
        if (e.shiftKey) return;
        e.preventDefault();

        const raw = input.value.trim();
        if (!raw) return;
        const text = raw.replace(/\n/g, '⋄');
        input.value = '';
        input.style.height = 'auto';
        history.push(raw);
        historyPos = -1;

        const url = text.startsWith(')') ? '/system' : '/eval';
        const param = text.startsWith(')') ? 'cmd' : 'expr';
        const body = new URLSearchParams();
        body.set(param, text);

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type':
                    'application/x-www-form-urlencoded'},
                body: body.toString()
            });
            const fragment = await resp.text();
            session.insertAdjacentHTML('beforeend', fragment);
            session.scrollTop = session.scrollHeight;
        } catch (err) {
            session.insertAdjacentHTML('beforeend',
                '<div class="entry">' +
                '<pre class="error">Connection error</pre>' +
                '</div>');
        }

        await refreshWorkspace();
        input.focus();
    });

    input.focus();
    refreshWorkspace();
    </script>
</body>
</html>
