<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARPLE</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'APL385 Unicode', 'DejaVu Sans Mono',
                         'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            padding: 0.5em;
            font-size: 1em;
            color: #8888aa;
            text-align: center;
        }
        #session {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 1em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        pre.input { color: #c0c0c0; }
        pre.output { color: #e0e0e0; }
        pre.error { color: #ff6b6b; }
        #input-bar {
            display: flex;
            padding: 0.5em;
            border-top: 1px solid #333;
            background: #16213e;
        }
        #input {
            flex: 1;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            outline: none;
        }
        #input:focus { border-color: #6b8afd; }
    </style>
</head>
<body>
    <h1>MARPLE</h1>
    <div id="session"></div>
    <div id="input-bar">
        <input type="text" id="input"
               autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false"
               placeholder="APL expression">
    </div>

    <script>
    const input = document.getElementById('input');
    const session = document.getElementById('session');

    input.addEventListener('keydown', async function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();

        const text = input.value.trim();
        if (!text) return;
        input.value = '';

        const url = text.startsWith(')') ? '/system' : '/eval';
        const param = text.startsWith(')') ? 'cmd' : 'expr';
        const body = new URLSearchParams();
        body.set(param, text);

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type':
                    'application/x-www-form-urlencoded'},
                body: body.toString()
            });
            const fragment = await resp.text();
            session.insertAdjacentHTML('beforeend', fragment);
            session.scrollTop = session.scrollHeight;
        } catch (err) {
            session.insertAdjacentHTML('beforeend',
                '<div class="entry">' +
                '<pre class="error">Connection error</pre>' +
                '</div>');
        }

        input.focus();
    });

    input.focus();
    </script>
</body>
</html>
