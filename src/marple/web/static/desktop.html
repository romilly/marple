<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIDE — MARPLE Web IDE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'APL385 Unicode', 'DejaVu Sans Mono',
                         'Courier New', monospace;
            font-size: 18px;
            height: 100vh;
            overflow: hidden;
        }
        .main-row { height: calc(100vh - 2.5em); }
        #session-col { display: flex; flex-direction: column; height: 100%; }
        #session {
            flex: 1;
            overflow-y: auto;
            padding: 0.5em 1em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            background: none;
            color: inherit;
        }
        pre.input { color: #c0c0c0; cursor: pointer; }
        pre.input:hover { background: #1a2a4a; border-radius: 3px; }
        pre.output { color: #e0e0e0; }
        pre.error { color: #ff6b6b; }
        #input-bar {
            padding: 0.5em;
            border-top: 1px solid #333;
            background: #16213e;
        }
        #input {
            width: 100%;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 0.5em;
            font-family: inherit;
            font-size: 1em;
            outline: none;
            resize: none;
            overflow: hidden;
        }
        #input:focus { border-color: #6b8afd; }
        #langbar {
            padding: 0.3em 0.5em;
            background: #16213e;
            border-bottom: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }
        #langbar button {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 0.2em 0.5em;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
        }
        #langbar button:hover { background: #1a4a8a; border-color: #6b8afd; }
        #workspace {
            background: #12122a;
            border-left: 1px solid #333;
            padding: 0.5em;
            overflow-y: auto;
            height: 100%;
            font-size: 0.9em;
        }
        #workspace h4 { color: #8888aa; font-size: 0.85em; margin: 0.5em 0 0.3em; }
        .ws-item {
            padding: 0.2em 0.4em;
            cursor: pointer;
            border-radius: 3px;
        }
        .ws-item:hover { background: #1a2a4a; }
        .ws-shape { color: #666; font-size: 0.85em; }
        .header-bar {
            padding: 0.3em 1em;
            background: #16213e;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
            color: #8888aa;
        }
    </style>
</head>
<body>
    <div class="header-bar d-flex justify-content-between align-items-center">
        <span class="d-flex align-items-center gap-3">
            <strong>PRIDE</strong>
            <div class="dropdown">
                <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                        type="button" data-bs-toggle="dropdown" style="font-size:0.85em;">
                    Session
                </button>
                <ul class="dropdown-menu dropdown-menu-dark">
                    <li><a class="dropdown-item" href="#" id="menu-save">Save...</a></li>
                    <li><a class="dropdown-item" href="#" id="menu-load">Load...</a></li>
                    <li><a class="dropdown-item" href="#" id="menu-delete">Delete...</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="https://romilly.github.io/marple/"
                           target="_blank">Docs &#8599;</a></li>
                </ul>
            </div>
        </span>
        <span class="d-flex align-items-center gap-3">
            <span id="mode-toggle" style="display:none; font-size:0.8em;">
                <label style="cursor:pointer; margin-right:0.5em;">
                    <input type="radio" name="mode" value="local" checked> Local
                </label>
                <label style="cursor:pointer;">
                    <input type="radio" name="mode" value="pico"> Pico
                </label>
            </span>
            <span id="ws-status" style="font-size:0.8em; color:#666;">connecting...</span>
        </span>
    </div>
    <div class="row g-0 main-row">
        <div class="col-md-9 col-lg-10" id="session-col">
            <div id="langbar"></div>
            <div id="session"></div>
            <div id="input-bar">
                <textarea id="input" rows="1"
                       autocomplete="off" autocorrect="off"
                       autocapitalize="off" spellcheck="false"
                       placeholder="APL expression"></textarea>
            </div>
        </div>
        <div class="col-md-3 col-lg-2">
            <div id="workspace"></div>
        </div>
    </div>

    <script>
    const input = document.getElementById('input');
    const session = document.getElementById('session');
    const workspace = document.getElementById('workspace');
    const wsStatus = document.getElementById('ws-status');

    // State
    const history = [];
    let historyPos = -1;

    // Click to re-edit: click any input line to copy it to the input area
    function attachInputClickHandlers() {
        session.querySelectorAll('pre.input').forEach(function(el) {
            if (!el.dataset.clickBound) {
                el.dataset.clickBound = '1';
                el.addEventListener('click', function() {
                    input.value = el.textContent.trim();
                    input.focus();
                });
            }
        });
    }

    // WebSocket connection
    let ws;
    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws');
        ws.onopen = function() {
            wsStatus.textContent = 'connected';
            wsStatus.style.color = '#4a4';
        };
        ws.onclose = function() {
            wsStatus.textContent = 'disconnected';
            wsStatus.style.color = '#a44';
            setTimeout(connectWS, 2000);
        };
        var messageHandlers = {
            result: function(msg) {
                session.insertAdjacentHTML('beforeend', msg.html);
                session.scrollTop = session.scrollHeight;
                attachInputClickHandlers();
            },
            workspace: function(msg) {
                workspace.innerHTML = msg.html;
                workspace.querySelectorAll('.ws-item').forEach(function(el) {
                    el.addEventListener('click', function() {
                        insertAtCursor(input, el.dataset.name);
                        input.focus();
                    });
                });
            },
            session_exists: function(msg) {
                if (msg.exists) {
                    if (confirm('Session "' + msg.name + '" already exists. Overwrite?')) {
                        ws.send(JSON.stringify({type: 'save_session', name: msg.name}));
                    }
                } else {
                    ws.send(JSON.stringify({type: 'save_session', name: pendingSaveName}));
                }
            },
            session_deleted: function(msg) {
                session.insertAdjacentHTML('beforeend',
                    '<div class="entry"><pre class="output">Session deleted: ' +
                    msg.name + '</pre></div>');
                session.scrollTop = session.scrollHeight;
            },
            session_saved: function(msg) {
                session.insertAdjacentHTML('beforeend',
                    '<div class="entry"><pre class="output">Session saved: ' +
                    msg.name + '</pre></div>');
                session.scrollTop = session.scrollHeight;
            },
            session_loaded: function(msg) {
                session.innerHTML = msg.html;
                attachInputClickHandlers();
                session.scrollTop = session.scrollHeight;
            },
            session_list: function(msg) {
                showLoadDialog(msg.sessions);
            },
            error: function(msg) {
                session.insertAdjacentHTML('beforeend',
                    '<div class="entry"><pre class="error">' +
                    msg.message + '</pre></div>');
                session.scrollTop = session.scrollHeight;
            }
        };
        ws.onmessage = function(e) {
            var msg = JSON.parse(e.data);
            var handler = messageHandlers[msg.type];
            if (handler) handler(msg);
            input.focus();
        };
    }
    connectWS();

    function insertAtCursor(el, text) {
        const start = el.selectionStart;
        const end = el.selectionEnd;
        const val = el.value;
        el.value = val.slice(0, start) + text + val.slice(end);
        el.selectionStart = el.selectionEnd = start + text.length;
    }

    // Language bar
    const GLYPH_INFO = [
        ['+','Add','`+'],['−','Subtract'],['×','Multiply','`-'],['÷','Divide','`='],
        ['⌈','Ceiling/Max','`!'],['⌊','Floor/Min','`d'],['*','Power'],['⍟','Log','`*'],
        ['|','Magnitude/Residue'],['○','Pi/Trig','`o'],['?','Roll/Deal'],
        ['<','Less'],['≤','Less or equal','`<'],['=','Equal'],['≥','Greater or equal','`>'],
        ['>','Greater'],['≠','Not equal','`/'],
        ['∧','And','`^'],['∨','Or','`v'],['~','Not'],
        ['⍴','Rho','`r'],['⍳','Iota','`i'],[',','Catenate'],['⌽','Reverse','`q'],
        ['⍉','Transpose','`Q'],['↑','Take','`t'],['↓','Drop','`y'],
        ['∈','Member','`e'],['⍋','Grade up','`g'],['⍒','Grade down','`G'],
        ['⊤','Encode','`n'],['⊥','Decode','`N'],['⌹','Domino','`D'],
        ['⍎','Execute','`z'],['⍕','Format','`Z'],['⌷','From','`I'],
        ['≡','Match'],['≢','Tally/Not match'],
        ['←','Assign','`l'],['⍵','Omega','`w'],['⍺','Alpha','`a'],
        ['∇','Del','`V'],['⋄','Diamond','`x'],['⍝','Comment','`c'],
        ['¯','High minus','`2'],
        ['∘','Jot','`j'],['⍤','Rank','`J'],['⌶','I-beam','`B'],
        ['{','Left brace','`['],['}','Right brace','`]'],
    ];
    const langbar = document.getElementById('langbar');
    GLYPH_INFO.forEach(function(g) {
        const btn = document.createElement('button');
        btn.textContent = g[0];
        btn.title = g[0] + ' — ' + g[1] + (g[2] ? ' — ' + g[2] : '');
        btn.addEventListener('click', function() {
            insertAtCursor(input, g[0]);
            input.focus();
        });
        langbar.appendChild(btn);
    });

    // Auto-resize textarea
    input.addEventListener('input', function() {
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
    });

    // Refresh workspace panel
    async function refreshWorkspace() {
        try {
            const resp = await fetch('/workspace');
            workspace.innerHTML = await resp.text();
            workspace.querySelectorAll('.ws-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    insertAtCursor(input, el.dataset.name);
                    input.focus();
                });
            });
        } catch(e) {}
    }

    input.addEventListener('keydown', function(e) {
        // History
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length === 0) return;
            if (historyPos < history.length - 1) historyPos++;
            input.value = history[history.length - 1 - historyPos];
            return;
        }
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyPos > 0) {
                historyPos--;
                input.value = history[history.length - 1 - historyPos];
            } else {
                historyPos = -1;
                input.value = '';
            }
            return;
        }
        // Submit
        if (e.key !== 'Enter') return;
        if (e.shiftKey) return;
        e.preventDefault();

        const raw = input.value.trim();
        if (!raw) return;
        const text = raw.replace(/\n/g, '⋄');
        input.value = '';
        input.style.height = 'auto';
        history.push(raw);
        historyPos = -1;

        if (ws && ws.readyState === WebSocket.OPEN) {
            if (text.startsWith(')')) {
                ws.send(JSON.stringify({type: 'system', cmd: text}));
            } else {
                ws.send(JSON.stringify({type: 'eval', expr: text}));
            }
        } else {
            session.insertAdjacentHTML('beforeend',
                '<div class="entry">' +
                '<pre class="error">Not connected</pre>' +
                '</div>');
        }
    });

    // Mode toggle
    var modeToggle = document.getElementById('mode-toggle');
    document.querySelectorAll('input[name="mode"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'mode', mode: radio.value}));
            }
        });
    });

    // Check if Pico is available and show toggle
    fetch('/config').then(function(r) { return r.json(); }).then(function(cfg) {
        if (cfg.pico_available) {
            modeToggle.style.display = '';
        }
    }).catch(function() {});

    // Session save/load/delete menu handlers
    var pendingSaveName = '';

    document.getElementById('menu-save').addEventListener('click', function(e) {
        e.preventDefault();
        var name = prompt('Session name:');
        if (name && ws && ws.readyState === WebSocket.OPEN) {
            pendingSaveName = name;
            ws.send(JSON.stringify({type: 'check_session', name: name}));
        }
    });

    document.getElementById('menu-load').addEventListener('click', function(e) {
        e.preventDefault();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'list_sessions'}));
        }
    });

    document.getElementById('menu-delete').addEventListener('click', function(e) {
        e.preventDefault();
        if (ws && ws.readyState === WebSocket.OPEN) {
            pendingAction = 'delete';
            ws.send(JSON.stringify({type: 'list_sessions'}));
        }
    });

    var pendingAction = 'load';

    function showLoadDialog(sessions) {
        if (sessions.length === 0) {
            alert('No saved sessions found.');
            return;
        }
        var action = pendingAction;
        pendingAction = 'load';
        var label = action === 'delete' ? 'Delete' : 'Load';
        var choice = prompt(label + ' session:\\n' + sessions.join('\\n') + '\\n\\nEnter name:');
        if (choice && ws && ws.readyState === WebSocket.OPEN) {
            if (action === 'delete') {
                if (confirm('Delete session "' + choice + '"? This cannot be undone.')) {
                    ws.send(JSON.stringify({type: 'delete_session', name: choice}));
                }
            } else {
                ws.send(JSON.stringify({type: 'load_session', name: choice}));
            }
        }
    }

    input.focus();
    </script>
</body>
</html>
